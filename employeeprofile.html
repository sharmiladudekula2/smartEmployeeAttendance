            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align: center;
        }

            text-align:center;

            width:220px;
        }

        #profile{

        .error{
            color:red;
            font-weight:bold;
            margin-top:15px;
        }
    </style>
</head>

<h2>Employee Profile Search</h2>

<input type="number" id="empId" placeholder="Enter Employee ID">

function searchEmployee(){

let empId = Number(document.getElementById("empId").value);

let emp = employees.find(e => e.id === empId);

let profile = document.getElementById("profile");
let msg = document.getElementById("msg");

if(emp){

profile.style.display="block";
msg.innerHTML="";

document.getElementById("id").innerHTML=emp.id;
document.getElementById("name").innerHTML=emp.name;
document.getElementById("department").innerHTML=emp.department;
document.getElementById("designation").innerHTML=emp.designation;
document.getElementById("email").innerHTML=emp.email;
document.getElementById("phone").innerHTML=emp.phone;
document.getElementById("attendance").innerHTML=emp.attendance;

let rows="";

emp.history.forEach(h=>{

rows += `
<tr>
<td>${h.date}</td>
<td>${h.in}</td>
<td>${h.out}</td>
<td>${h.status}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=rows;

}
else{

profile.style.display="none";
msg.innerHTML="Employee Not Found";

}
